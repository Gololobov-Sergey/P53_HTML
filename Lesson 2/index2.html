<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <style>
            *
            {
                font-family: Segoe UI;
                font-size: 18px;
            }
            .card
            {
                display: inline-block;
                width: 106px;
                font-size: 30px;
                text-align: center;
                background-color: antiquewhite;
                padding: 5px;
                font-weight: 400;
            }
            
            .red
            {
                color: red;
            }
        
        </style>
    </head>
    <body>
        <div class="player">
            <p>Player 1</p>
            <span class="card">6&spades;</span>
            <span class="card red">5P</span>
            <span class="card">KK</span>
            <span class="card red">QP</span>
            <span class="card"></span>
            <span class="card">&lt;tag &frasl;&gt;</span>
        </div>
        <div class="player">
            <p>Player 2</p>
            <span class="card"></span>
            <span class="card"></span>
            <span class="card"></span>
            <span class="card"></span>
            <span class="card"></span>
            <span class="card"></span>
        </div>
    </body>
</html>
