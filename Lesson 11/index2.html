<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            *{
                margin: 0;
                padding: 0;
            }
            
            .cont{
                max-width: 1100px;
                min-width: 350px;
                margin: auto;
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            
            header{
                background-color: aqua;
                height: 5vh;
            }
            
            main{
                display: flex;
                flex: 1 1 auto;
            }
            
            main > aside{
                background-color: chartreuse;
                flex-basis: 200px;
            }
            
            section{
                background-color: #e47e92;
                flex: 1 1 auto;
            }
            
            main>section+aside{
                background-color: #9a71c0;
                flex-basis: 20%;
            }
            
            footer{
                background-color: bisque;
                height: 5vh;
            }
            
            @media screen and (max-width:800px)
            {
                main>section+aside{
                    display: none;
                }
                
                main > aside{
                    flex-basis: 30%;
                }
            }
            
            @media screen and (max-width:550px)
            {
                main{
                    flex-direction: column;
                }
                
                main > aside{
                    flex-basis: 10%;
                }
            }
            
        
        </style>
    </head>
    <body>
        <div class="cont">
            <header>Header</header>
            <main>
                <aside>Left</aside>
                <section>Content</section>
                <aside>Right</aside>
            </main>
            <footer>Footer</footer>
        </div>
        
    </body>
</html>
