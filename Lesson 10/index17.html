<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        .card {
            margin: 10px;
            padding: 15px;
            font-size: 13px;
            top:9px;
            left: -28px;
            transition: all 1s ease;
        }

        
        .cont{
            overflow: hidden;
            width: 200px;
            height: 300px;
            border-radius: 5%;
            border: 1px solid grey;
            transition: all 1s ease;
            box-shadow: 2px 2px 17px 2px;
            display: inline-block;
            margin: 20px;
        }

        .cont:hover {
            transform: scale(1.2);
        }
        .cont:hover .card{
            transform: scale(0.8333);
        }
        

        .top-line {
            height: 2px;
            width: 282px;
            margin: 0 -53px;
        }

        .enterprise .top-line { 
            background: #d12f52;
        }
        .professional .top-line { 
            background: #e67e22;
        }
        .standart .top-line { 
            background: #2980b9;
        }
        .basic .top-line { 
            background: #27ae60;
        }

        .card h3 {
            margin: 10px 0;
            font-size: 14px;
            color: #333333;
        }

        .price {
            font-size: 36px;
            font-weight: 700
        }

        .period {
            color: #999999;
            margin-bottom: 15px;
            display: block;
        }

        .features {
            list-style: none;
            padding: 0;
            margin: 15px 0;
            color: #555555;
        }

        .btn {
            display: inline-block;
            padding: 8px 20px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .enterprise .btn { 
            background: #d12f52;
        }

    </style>
</head>
<body>

<div class="wrapper">
    <div class="cont">
        <div class="card enterprise">
           <h3>ENTERPRISE</h3>
            <div class="top-line"></div>
            
            <div class="price">$69</div>
            <span class="period">per month</span>
            <ul class="features">
                <li>10GB disk space</li>
                <li>100GB monthly bandwidth</li>
                <li>20 email accounts</li>
                <li>Unlimited subdomens</li>
            </ul>
            <a href="#" class="btn">BUY</a>
        </div>
    </div>
    <div class="cont">
        <div class="card enterprise">
           <h3>ENTERPRISE</h3>
            <div class="top-line"></div>
            
            <div class="price">$69</div>
            <span class="period">per month</span>
            <ul class="features">
                <li>10GB disk space</li>
                <li>100GB monthly bandwidth</li>
                <li>20 email accounts</li>
                <li>Unlimited subdomens</li>
            </ul>
            <a href="#" class="btn">BUY</a>
        </div>
    </div>

</div>

</body>
</html>
